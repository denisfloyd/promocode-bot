{% if codes %}
<figure>
<table>
    <thead>
        <tr>
            <th>Code</th>
            <th>Platform</th>
            <th>Discount</th>
            <th>Confidence</th>
            <th>Votes</th>
            <th>Age</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for code in codes %}
        {% include "partials/code_row.html" %}
        {% endfor %}
    </tbody>
</table>
</figure>

{% if total_pages > 1 %}
<nav>
    <ul>
        {% if page > 1 %}
        <li>
            <a href="#"
               hx-get="/dashboard/codes?page={{ page - 1 }}&platform={{ platform }}&sort_by={{ sort_by }}&min_confidence={{ min_confidence }}&per_page={{ per_page }}"
               hx-target="#codes-container"
               hx-swap="innerHTML">
                Previous
            </a>
        </li>
        {% endif %}
        <li><small>Page {{ page }} of {{ total_pages }} ({{ total }} codes)</small></li>
        {% if page < total_pages %}
        <li>
            <a href="#"
               hx-get="/dashboard/codes?page={{ page + 1 }}&platform={{ platform }}&sort_by={{ sort_by }}&min_confidence={{ min_confidence }}&per_page={{ per_page }}"
               hx-target="#codes-container"
               hx-swap="innerHTML">
                Next
            </a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}

{% else %}
<p>No codes found.</p>
{% endif %}
